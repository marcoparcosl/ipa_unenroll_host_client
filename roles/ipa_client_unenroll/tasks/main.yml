---
# =============================================================================
# Tasks: ipa_client_unenroll — Desenrola el cliente IPA del host destino
# =============================================================================

- name: Verificar si el host está enrollado en IPA
  ansible.builtin.stat:
    path: /etc/ipa/default.conf
  register: ipa_conf

- name: Mostrar estado de enrollamiento
  ansible.builtin.debug:
    msg: >
      Host {{ inventory_hostname }}:
      {{ 'ENROLLADO en IPA, procediendo a desenrolar.' if ipa_conf.stat.exists
         else 'NO está enrollado en IPA, omitiendo.' }}

- name: Ejecutar ipa-client-uninstall
  ansible.builtin.command:
    cmd: >
      ipa-client --uninstall --unattended
      {{ '--force' if ipa_force_unenroll else '' }}
  when: ipa_conf.stat.exists
  register: unenroll_result
  changed_when: unenroll_result.rc == 0
  failed_when:
    - unenroll_result.rc != 0
    - not ipa_force_unenroll
  notify:
    - restart sssd
    - restart oddjobd

- name: Mostrar resultado del unenroll
  ansible.builtin.debug:
    var: unenroll_result.stdout_lines
  when:
    - ipa_conf.stat.exists
    - unenroll_result is defined

- name: Eliminar archivos residuales de IPA
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop: "{{ ipa_cleanup_paths }}"
  when: ipa_cleanup_files | bool
  ignore_errors: true

- name: Aplicar krb5.conf limpio post-unenroll
  ansible.builtin.template:
    src: krb5.conf.j2
    dest: /etc/krb5.conf
    owner: root
    group: root
    mode: "0644"
  when: ipa_conf.stat.exists

- name: Verificar resultado final
  ansible.builtin.stat:
    path: /etc/ipa/default.conf
  register: ipa_conf_post

- name: Mostrar resultado final
  ansible.builtin.debug:
    msg: >
      {{ '✓ Host ' + inventory_hostname + ' desenrolado correctamente.'
         if not ipa_conf_post.stat.exists
         else '✗ Advertencia: /etc/ipa/default.conf aún existe en ' + inventory_hostname }}
