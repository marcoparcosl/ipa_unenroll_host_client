---
# =============================================================================
# Tasks: ipa_server_cleanup — Elimina hosts del servidor FreeIPA / Red Hat IDM
# =============================================================================

- name: Crear archivo temporal de contraseña para kinit
  ansible.builtin.tempfile:
    state: file
    prefix: kinit_
  register: kinit_passfile
  no_log: true

- name: Escribir contraseña en archivo temporal
  ansible.builtin.copy:
    content: "{{ ipa_admin_password }}"
    dest: "{{ kinit_passfile.path }}"
    mode: "0600"
  no_log: true

- name: Obtener ticket Kerberos de admin
  ansible.builtin.shell: |
    kinit {{ ipa_admin_user }} < {{ kinit_passfile.path }}
  no_log: true
  changed_when: false
  register: kinit_result
  failed_when: kinit_result.rc != 0

- name: Eliminar archivo temporal de contraseña
  ansible.builtin.file:
    path: "{{ kinit_passfile.path }}"
    state: absent
  no_log: true

- name: Procesar cada host a eliminar
  ansible.builtin.include_tasks: remove_host.yml
  loop: "{{ ipa_hosts_to_remove }}"
  loop_control:
    loop_var: ipa_target_host
    label: "{{ ipa_target_host }}"

- name: Generar reporte de desenrollamiento
  ansible.builtin.template:
    src: unenroll_report.j2
    dest: /var/log/ipa_unenroll_report.txt
    owner: root
    group: root
    mode: "0640"

- name: Destruir ticket Kerberos
  ansible.builtin.command:
    cmd: kdestroy
  changed_when: false
  notify: destroy kerberos ticket
  ignore_errors: true
