[defaults]
inventory           = inventory/hosts.ini
roles_path          = roles
vars_files          = vars/
remote_user         = root
host_key_checking   = False
retry_files_enabled = False
forks               = 10
timeout             = 30
log_path            = ansible.log

# Vault
vault_password_file = .vault_pass

[privilege_escalation]
become          = True
become_method   = sudo
become_user     = root
become_ask_pass = False
